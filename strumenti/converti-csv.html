<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Converti CSV in services.json</title>
  <style>
    body{max-width:820px;margin:0 auto;padding:24px;font:18px Arial;line-height:1.5}
    h1{font-size:2rem}
    .box{padding:20px;border:2px solid #1f6f8b;border-radius:14px;background:#f4f8fa}
    input,button{font:inherit}
    button{display:block;margin-top:16px;padding:14px 20px;border:0;border-radius:10px;color:#fff;background:#1f6f8b;font-weight:700;cursor:pointer}
    pre{white-space:pre-wrap;background:#eee;padding:14px;border-radius:10px}
  </style>
</head>
<body>
  <h1>Converti il CSV dei servizi</h1>
  <div class="box">
    <p>Questo strumento funziona soltanto nel browser. Il CSV non viene inviato online.</p>
    <input id="file" type="file" accept=".csv,text/csv">
    <button id="convert" type="button">Crea services.json</button>
    <p id="status"></p>
  </div>
  <h2>Colonne principali</h2>
  <pre>nome_servizio,tipo_luogo,municipio,indirizzo,latitudine,longitudine</pre>

<script>
function parseCsv(text) {
  const rows=[]; let row=[]; let field=""; let quoted=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c === '"' && quoted && n === '"'){ field+='"'; i++; }
    else if(c === '"'){ quoted=!quoted; }
    else if(c === ',' && !quoted){ row.push(field); field=""; }
    else if((c === '\n' || c === '\r') && !quoted){
      if(c === '\r' && n === '\n') i++;
      row.push(field); if(row.some(v=>v!=="")) rows.push(row);
      row=[]; field="";
    } else field+=c;
  }
  row.push(field); if(row.some(v=>v!=="")) rows.push(row);
  if(rows.length<2) return [];
  const headers=rows[0].map(h=>h.replace(/^\uFEFF/,"").trim());
  return rows.slice(1).map(values=>{
    const obj={};
    headers.forEach((h,i)=>obj[h]=values[i]??"");
    ["latitudine","longitudine"].forEach(key=>{
      if(obj[key] !== "") obj[key]=Number(String(obj[key]).replace(",","."));
    });
    return obj;
  });
}

document.getElementById("convert").addEventListener("click", async()=>{
  const file=document.getElementById("file").files[0];
  const status=document.getElementById("status");
  if(!file){ status.textContent="Seleziona prima un CSV."; return; }
  try{
    const records=parseCsv(await file.text());
    if(!records.length) throw new Error("Nessuna riga trovata.");
    const blob=new Blob([JSON.stringify(records,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="services.json"; a.click();
    URL.revokeObjectURL(url);
    status.textContent=`Creato services.json con ${records.length} righe.`;
  }catch(error){
    status.textContent=`Errore: ${error.message}`;
  }
});
</script>
</body>
</html>
